; tdeck-doom — PlatformIO build for LilyGo T-Deck Plus (ESP32-S3)
; Doom engine: espressif/esp32-doom (PrBoom) in lib/esp32-doom/
; Hardware drivers imported from openmeshos-868 (Saitama)
;
; Build:   pio run -e t-deck
; Flash:   pio run -e t-deck -t upload
; WAD:     esptool.py ... write_flash 0xA10000 DOOM1.WAD   (after build)
; Monitor: pio device monitor  (115200 baud)

[env:t-deck]
platform  = espressif32
board     = esp32-s3-devkitm-1
framework = arduino

; ── Flash & partition layout ─────────────────────────────────────────────────
board_build.flash_size    = 16MB
board_build.flash_mode    = dio
board_build.partitions    = partitions.csv
board_upload.flash_size   = 16MB
board_upload.maximum_size = 7340032

; Embed the WAD inside the firmware binary so no separate flash step is needed.
; The linker exposes _binary_doom1_cut_wad_start / _binary_doom1_cut_wad_end.
; i_system.c uses these instead of esp_partition_mmap.
board_build.embed_files   = doom1-cut.wad

; ── CPU & PSRAM ──────────────────────────────────────────────────────────────
board_build.f_cpu               = 240000000L
board_build.arduino.memory_type = qio_opi

build_flags =
  -DARDUINO_ESP32S3_DEV
  -DBOARD_HAS_PSRAM=1
  -DPSRAM=opi
  -DPSRAM_MODE=octal
  -DPSRAM_SIZE=8388608
  -DCONFIG_SPIRAM_USE_MALLOC=1
  -DCONFIG_ESP32S3_SPIRAM_SUPPORT=1

; ── USB CDC ──────────────────────────────────────────────────────────────────
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1

; ── T-Deck Plus display (ST7789 via TFT_eSPI) ───────────────────────────────
  -DUSER_SETUP_LOADED=1
  -DST7789_DRIVER=1
  -DUSE_FSPI_PORT
  -DTFT_INVERT_COLORS
  -DTFT_WIDTH=320
  -DTFT_HEIGHT=240
  -DCGRAM_OFFSET=1
  -DTFT_CS=12
  -DTFT_DC=11
  -DTFT_RST=-1
  -DTFT_BL=42
  -DTFT_MOSI=41
  -DTFT_MISO=38
  -DTFT_SCLK=40
  -DLOAD_GLCD=1
  -DSPI_FREQUENCY=40000000
  -DSPI_READ_FREQUENCY=6000000

; ── PrBoom screen size ───────────────────────────────────────────────────────
; doomdef.h already defines SCREENWIDTH=320 SCREENHEIGHT=240, but
; these flags let our own code reference screen dimensions consistently.
  -DOPS_SCREEN_W=320
  -DOPS_SCREEN_H=240

; ── Debug ────────────────────────────────────────────────────────────────────
  -DCORE_DEBUG_LEVEL=1
  -DBOARD_HAS_USB_SERIAL=1

; ── Suppress noisy PrBoom warnings ──────────────────────────────────────────
  -Wno-implicit-function-declaration
  -Wno-unused-variable
  -Wno-unused-but-set-variable
  -Wno-int-conversion

; ── Optimisation ─────────────────────────────────────────────────────────────
  -Os
  -ffunction-sections
  -fdata-sections
  -Wl,--gc-sections

; ── Include search order ─────────────────────────────────────────────────────
; src/shims/ is first so our compat headers (esp_spi_flash.h, esp_heap_alloc_caps.h)
; shadow the removed/changed IDF headers before the system path is searched.
  -I ${PROJECT_DIR}/src/shims
  -I ${PROJECT_DIR}/lib/esp32-doom/components/prboom/include
  -I ${PROJECT_DIR}/lib/esp32-doom/components/prboom-esp32-compat/include
  -I ${PROJECT_DIR}/lib/esp32-doom/components/prboom-wad-tables/include

; Force-include compat header before every translation unit.
  -include ${PROJECT_DIR}/src/shims/esp32_compat.h

; ── Library dependencies ─────────────────────────────────────────────────────
lib_deps =
  bodmer/TFT_eSPI@^2.5.34
  adafruit/Adafruit BusIO@^1.16

; ── PrBoom component libraries ───────────────────────────────────────────────
; lib_extra_dirs must point to the PARENT of the library folders — PlatformIO
; scans one level deep inside each entry to discover libraries via library.json.
; Pointing directly at the component dirs caused them to be seen as header-only.
lib_extra_dirs =
  lib/esp32-doom/components

; PlatformIO LDF mode: deep+ scans all libs recursively so the prboom headers
; are available to our shims and to src/*.cpp.
lib_ldf_mode = deep+

; ── Monitor ──────────────────────────────────────────────────────────────────
monitor_speed   = 115200
monitor_filters = direct
upload_speed    = 921600
upload_port     =
